name: Deploy Frontend

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy frontend to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEP_HOST }}
          username: ${{ secrets.DEP_USER }}
          key: ${{ secrets.DEP_SSH_KEY }}
          port: ${{ secrets.DEP_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            cd /var/www/apf/portal
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose -f /var/www/apf/docker-compose.yaml up -d --build frontend
