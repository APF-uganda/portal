name: Deploy Frontend

on:
  push:
    branches:
      - main
      
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy frontend to DigitalOcean
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEP_HOST }}
          username: ${{ secrets.DEP_USER }}
          key: ${{ secrets.DEP_SSH_KEY }}
          passphrase: ${{ secrets.DEP_SSH_PASSPHRASE }}
          port: ${{ secrets.DEP_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            cd /var/www/apf/portal
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            docker compose -f /var/www/apf/docker-compose.yaml up -d --build frontend
            i=1
            until [ "$i" -gt 20 ]; do
              if curl -fsS http://localhost/ >/dev/null; then
                echo "Frontend health check passed."
                exit 0
              fi
              echo "Waiting for frontend... attempt $i/20"
              sleep 3
              i=$((i + 1))
            done
            echo "Frontend health check failed."
            docker compose -f /var/www/apf/docker-compose.yaml logs --tail=120 frontend
            exit 1
